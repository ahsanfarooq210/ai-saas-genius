<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" fill="none">
  <defs>
    <linearGradient id="baseTop" x1="95" y1="151" x2="220" y2="249" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE8DE"/>
      <stop offset="0.48" stop-color="#FFAD92"/>
      <stop offset="1" stop-color="#FF7E5F"/>
    </linearGradient>
    <linearGradient id="baseLeft" x1="55" y1="198" x2="155" y2="282" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C95F53"/>
      <stop offset="1" stop-color="#713B40"/>
    </linearGradient>
    <linearGradient id="baseRight" x1="160" y1="249" x2="260" y2="195" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A94740"/>
      <stop offset="1" stop-color="#EF765C"/>
    </linearGradient>
    <linearGradient id="glassTop" x1="105" y1="63" x2="216" y2="146" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF9F5" stop-opacity="0.95"/>
      <stop offset="0.48" stop-color="#FFD5C3" stop-opacity="0.76"/>
      <stop offset="1" stop-color="#FEB47B" stop-opacity="0.58"/>
    </linearGradient>
    <linearGradient id="glassLeft" x1="74" y1="102" x2="156" y2="170" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF9C82" stop-opacity="0.52"/>
      <stop offset="1" stop-color="#8D4747" stop-opacity="0.72"/>
    </linearGradient>
    <linearGradient id="glassRight" x1="160" y1="145" x2="247" y2="101" gradientUnits="userSpaceOnUse">
      <stop stop-color="#BF5147" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#FF9C82" stop-opacity="0.48"/>
    </linearGradient>
    <linearGradient id="coreTop" x1="137" y1="80" x2="181" y2="114" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF9F5"/>
      <stop offset="1" stop-color="#FEB47B"/>
    </linearGradient>
    <linearGradient id="coreLeft" x1="132" y1="97" x2="164" y2="144" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF8F73"/>
      <stop offset="1" stop-color="#9D4442"/>
    </linearGradient>
    <linearGradient id="coreRight" x1="160" y1="112" x2="193" y2="98" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C95248"/>
      <stop offset="1" stop-color="#FF9E78"/>
    </linearGradient>
    <radialGradient id="groundShadow" cx="0" cy="0" r="1" gradientTransform="translate(160 290) rotate(90) scale(18 104)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2A2024" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#2A2024" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="0" cy="0" r="1" gradientTransform="translate(160 112) rotate(90) scale(73)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFB89F" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#FF7E5F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glassSheen" x1="86" y1="75" x2="218" y2="139" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF9F5" stop-opacity="0.5"/>
      <stop offset="0.38" stop-color="#FFF9F5" stop-opacity="0.04"/>
      <stop offset="0.64" stop-color="#FFF9F5" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#FFF9F5" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="signalBeam" x1="160" y1="84" x2="160" y2="218" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF9F5" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#FF7E5F" stop-opacity="0"/>
    </linearGradient>
    <filter id="blurGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="dropShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#3D3436" flood-opacity="0.2"/>
    </filter>
    <filter id="nodeGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <ellipse cx="160" cy="290" rx="104" ry="18" fill="url(#groundShadow)"/>

  <g opacity="0.72">
    <path d="M35 127C72 56 144 25 217 50C257 64 285 94 299 130" stroke="#FFB89F" stroke-opacity="0.32" stroke-width="1.5" stroke-dasharray="4 9" stroke-linecap="round"/>
    <circle cx="35" cy="127" r="4.5" fill="#FEB47B"/>
    <circle cx="299" cy="130" r="4.5" fill="#FF7E5F"/>
    <circle cx="217" cy="50" r="3" fill="#FFF9F5"/>
  </g>

  <circle cx="160" cy="112" r="73" fill="url(#coreGlow)" filter="url(#blurGlow)"/>
  <path d="M160 91L177 100L177 190L160 199L143 190V100L160 91Z" fill="url(#signalBeam)" opacity="0.45"/>
  <g fill="none" stroke="#FFDAC9" stroke-opacity="0.42" stroke-width="1.2" stroke-dasharray="3 6">
    <circle cx="160" cy="112" r="52">
      <animateTransform attributeName="transform" type="rotate" from="0 160 112" to="360 160 112" dur="18s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g filter="url(#dropShadow)">
    <!-- Foundation layer -->
    <path d="M55 198L160 252V286L55 232V198Z" fill="url(#baseLeft)"/>
    <path d="M160 252L265 198V232L160 286V252Z" fill="url(#baseRight)"/>
    <path d="M55 198L160 144L265 198L160 252L55 198Z" fill="url(#baseTop)"/>
    <path d="M76 198L160 155L244 198L160 241L76 198Z" fill="url(#glassSheen)" opacity="0.58"/>
    <path d="M55 198L160 252L265 198" stroke="#FFF4EE" stroke-opacity="0.45" stroke-width="1.5"/>
    <path d="M160 252V286" stroke="#592F35" stroke-opacity="0.38" stroke-width="1.5"/>

    <!-- Inset panel and orchestration graph -->
    <path d="M76 198L160 155L244 198L160 241L76 198Z" fill="#7E3E42" fill-opacity="0.16" stroke="#FFF4EE" stroke-opacity="0.42" stroke-width="1.5"/>
    <g stroke="#A94740" stroke-opacity="0.6" stroke-width="1.7" stroke-linecap="round">
      <path d="M108 195L143 178"/>
      <path d="M177 178L212 195"/>
      <path d="M110 211L145 228"/>
      <path d="M175 228L210 211"/>
    </g>
    <g fill="#FFF9F5" stroke="#FF7E5F" stroke-width="2" filter="url(#nodeGlow)">
      <circle cx="104" cy="197" r="6"/>
      <circle cx="216" cy="197" r="6"/>
      <circle cx="104" cy="213" r="6"/>
      <circle cx="216" cy="213" r="6"/>
    </g>
    <g fill="#FFF9F5" stroke="#FF7E5F" stroke-width="1.8" stroke-linejoin="round">
      <path d="M121 187L132 181L143 187L132 193L121 187Z"/>
      <path d="M177 187L188 181L199 187L188 193L177 187Z"/>
    </g>
    <g stroke="#FFF9F5" stroke-opacity="0.82" stroke-width="1.6" stroke-linecap="round">
      <path d="M132 201V211M127 206H137"/>
      <path d="M188 201V211M183 206H193"/>
    </g>
    <path d="M145 178L160 170L175 178L160 186L145 178Z" fill="#FFF9F5" stroke="#FF7E5F" stroke-width="2"/>
    <path d="M145 228L160 220L175 228L160 236L145 228Z" fill="#FFF9F5" stroke="#FF7E5F" stroke-width="2"/>

    <!-- Light bridge between layers -->
    <g stroke="#FFB49C" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3 7">
      <path d="M74 123V190"/>
      <path d="M246 123V190"/>
      <path d="M160 169V215"/>
    </g>

    <!-- Floating glass layer -->
    <path d="M74 102L160 146V169L74 125V102Z" fill="url(#glassLeft)" stroke="#FFC9B5" stroke-opacity="0.56" stroke-width="1.5"/>
    <path d="M160 146L246 102V125L160 169V146Z" fill="url(#glassRight)" stroke="#FFC9B5" stroke-opacity="0.56" stroke-width="1.5"/>
    <path d="M74 102L160 58L246 102L160 146L74 102Z" fill="url(#glassTop)" stroke="#FFE8DE" stroke-opacity="0.9" stroke-width="2"/>
    <path d="M88 102L160 65L232 102L160 139L88 102Z" fill="#FFF9F5" fill-opacity="0.12" stroke="#FFF9F5" stroke-opacity="0.52" stroke-width="1.3"/>
    <path d="M88 102L160 65L232 102L160 139L88 102Z" fill="url(#glassSheen)" opacity="0.7"/>
    <path d="M74 102L160 146L246 102" stroke="#FFF9F5" stroke-opacity="0.5" stroke-width="1.3"/>
    <g fill="#FFF9F5" fill-opacity="0.76">
      <path d="M101 101L110 96L119 101L110 106L101 101Z"/>
      <path d="M201 101L210 96L219 101L210 106L201 101Z"/>
    </g>

    <!-- Raised core -->
    <path d="M130 98L160 113V145L130 130V98Z" fill="url(#coreLeft)"/>
    <path d="M160 113L190 98V130L160 145V113Z" fill="url(#coreRight)"/>
    <path d="M130 98L160 82L190 98L160 113L130 98Z" fill="url(#coreTop)" stroke="#FFF9F5" stroke-opacity="0.85" stroke-width="1.5"/>
    <path d="M160 113V145" stroke="#75383D" stroke-opacity="0.4" stroke-width="1.4"/>
    <path d="M146 98L160 91L174 98L160 105L146 98Z" fill="#FF7E5F"/>
    <circle cx="160" cy="98" r="7" fill="#FFF9F5" fill-opacity="0.3" filter="url(#nodeGlow)">
      <animate attributeName="r" values="5.5;8;5.5" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="98" r="3.5" fill="#FFF9F5"/>
  </g>

  <g fill="#FFF9F5">
    <circle cx="58" cy="70" r="2.5" fill-opacity="0.8"/>
    <circle cx="272" cy="181" r="2" fill-opacity="0.65"/>
    <path d="M263 62V76M256 69H270" stroke="#FFF9F5" stroke-opacity="0.75" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
