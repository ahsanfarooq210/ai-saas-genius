<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <defs>
    <!-- Solid block: lit top face -->
    <linearGradient id="topFace" x1="0" y1="119" x2="0" y2="181" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f9cca7"/>
      <stop offset="55%" stop-color="#f0a26e"/>
      <stop offset="100%" stop-color="#e88f57"/>
    </linearGradient>
    <!-- Solid block: right wall (medium) -->
    <linearGradient id="rightWall" x1="0" y1="150" x2="0" y2="211" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#cd7a44"/>
      <stop offset="100%" stop-color="#a2551c"/>
    </linearGradient>
    <!-- Solid block: left wall (shadowed) -->
    <linearGradient id="leftWall" x1="0" y1="150" x2="0" y2="211" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9c5730"/>
      <stop offset="100%" stop-color="#703c1b"/>
    </linearGradient>

    <!-- Glass block: translucent top -->
    <linearGradient id="glassTop" x1="0" y1="24" x2="0" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffe7d5"/>
      <stop offset="100%" stop-color="#f2b98f"/>
    </linearGradient>

    <radialGradient id="groundShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a1d0f" stop-opacity="0.32"/>
      <stop offset="70%" stop-color="#3a1d0f" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3a1d0f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="topSheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="100" cy="226" rx="60" ry="10.5" fill="url(#groundShadow)"/>

  <!-- ===== SOLID ISOMETRIC BLOCK =====
       top face vertices: T(100,119) R(162,150) B(100,181) L(38,150)
       extruded down by 30 -> L'(38,180) B'(100,211) R'(162,180)
       rounded corners faked with matching round-join strokes -->

  <!-- left wall (darkest) -->
  <path d="M38,150 L100,181 L100,211 L38,180 Z"
        fill="url(#leftWall)" stroke="url(#leftWall)"
        stroke-width="9" stroke-linejoin="round"/>
  <!-- right wall (medium) -->
  <path d="M100,181 L162,150 L162,180 L100,211 Z"
        fill="url(#rightWall)" stroke="url(#rightWall)"
        stroke-width="9" stroke-linejoin="round"/>
  <!-- front vertical seam for edge definition -->
  <path d="M100,181 L100,211" stroke="#6b3818" stroke-opacity="0.28"
        stroke-width="1.4" stroke-linecap="round"/>

  <!-- top face (lightest) -->
  <path d="M100,119 L162,150 L100,181 L38,150 Z"
        fill="url(#topFace)" stroke="url(#topFace)"
        stroke-width="9" stroke-linejoin="round"/>

  <!-- rim light along the top ridges -->
  <path d="M38,150 L100,119 L162,150" fill="none"
        stroke="#ffd9b8" stroke-opacity="0.6" stroke-width="1.6"
        stroke-linejoin="round" stroke-linecap="round"/>
  <!-- glossy sheen on the top face -->
  <ellipse cx="112" cy="139" rx="24" ry="8" fill="url(#topSheen)"
           transform="rotate(26.57 112 139)"/>

  <!-- ===== DASHED CONNECTORS ===== -->
  <g stroke="#e0894f" stroke-opacity="0.45" stroke-dasharray="2 6"
     stroke-width="1.6" stroke-linecap="round">
    <line x1="38" y1="84" x2="38" y2="146"/>
    <line x1="162" y1="84" x2="162" y2="146"/>
  </g>

  <!-- ===== FLOATING GLASS BLOCK =====
       top face: T(100,24) R(162,55) B(100,86) L(38,55)
       extruded down by 20 -> L'(38,75) B'(100,106) R'(162,75) -->

  <!-- frosted glass walls -->
  <path d="M38,55 L100,86 L100,106 L38,75 Z"
        fill="#7c4a2c" fill-opacity="0.5"
        stroke="#f3a878" stroke-opacity="0.55" stroke-width="1.4"
        stroke-linejoin="round"/>
  <path d="M100,86 L162,55 L162,75 L100,106 Z"
        fill="#a86238" fill-opacity="0.5"
        stroke="#f3a878" stroke-opacity="0.6" stroke-width="1.4"
        stroke-linejoin="round"/>
  <!-- frosted glass top -->
  <path d="M100,24 L162,55 L100,86 L38,55 Z"
        fill="url(#glassTop)" fill-opacity="0.5"
        stroke="#ffd0aa" stroke-opacity="0.85" stroke-width="1.8"
        stroke-linejoin="round"/>
  <!-- glass top ridge highlight -->
  <path d="M38,55 L100,24 L162,55" fill="none"
        stroke="#ffffff" stroke-opacity="0.65" stroke-width="1.4"
        stroke-linejoin="round" stroke-linecap="round"/>
  <!-- glass top sheen -->
  <ellipse cx="112" cy="44" rx="20" ry="7" fill="url(#topSheen)"
           transform="rotate(26.57 112 44)"/>
</svg>
